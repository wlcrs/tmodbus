---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      dependencies:
        patterns:
          - '*'

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /integration_tests/rmodbus
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /integration_tests/tokio
    schedule:
      interval: weekly
